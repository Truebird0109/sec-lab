services:
  # ── 취약한 타깃 서버
  target:
    build:
      context: .
      dockerfile: Dockerfile.target
    ports:
      - "5000:5000"
    networks:
      - internal
      - external

  # ── 내부망 전용 비밀 서비스 (외부에서 직접 접근 불가)
  internal-api:
    image: python:3.11-alpine
    command:
      - python
      - -c
      - |
        from http.server import BaseHTTPRequestHandler, HTTPServer
        import json
        class H(BaseHTTPRequestHandler):
            def do_GET(self):
                self.send_response(200)
                self.send_header('Content-Type', 'application/json')
                self.end_headers()
                payload = {
                    'access': 'INTERNAL_ONLY',
                    'db_host': 'db.internal',
                    'db_password': 'sup3r_s3cr3t_pw',
                    'message': 'SSRF 성공 - 내부 서비스에 도달했습니다'
                }
                self.wfile.write(json.dumps(payload, ensure_ascii=False).encode())
            def log_message(self, *a): pass
        HTTPServer(('0.0.0.0', 8080), H).serve_forever()
    networks:
      - internal

  # ── 공격자 리다이렉터 (302 → internal-api)
  attacker-redirector:
    image: python:3.11-alpine
    command:
      - python
      - -c
      - |
        from http.server import BaseHTTPRequestHandler, HTTPServer
        class H(BaseHTTPRequestHandler):
            def do_GET(self):
                self.send_response(302)
                self.send_header('Location', 'http://internal-api:8080/')
                self.end_headers()
            def log_message(self, *a): pass
        HTTPServer(('0.0.0.0', 9000), H).serve_forever()
    ports:
      - "9000:9000"
    networks:
      - internal
      - external

networks:
  internal:
    internal: true
  external: